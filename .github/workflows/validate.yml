name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  skills:
    name: Validate skills & marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skill frontmatter + marketplace.json
        run: python3 .github/scripts/validate_skills.py
      - name: Check marketplace.json is valid JSON
        run: python3 -c "import json; json.load(open('.claude-plugin/marketplace.json')); print('marketplace.json OK')"
